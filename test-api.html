<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .result {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <h1>API连接测试</h1>
    
    <div>
        <button onclick="testBackend()">测试后端连接</button>
        <button onclick="testProducts()">测试产品API</button>
        <button onclick="clearResults()">清空结果</button>
    </div>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'http://192.168.31.46:8081';
        
        function addResult(title, content, isError = false) {
            const div = document.createElement('div');
            div.className = 'result ' + (isError ? 'error' : 'success');
            div.innerHTML = `<strong>${title}</strong>\n${content}`;
            document.getElementById('results').appendChild(div);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testBackend() {
            addResult('测试开始', '正在连接后端服务器...');
            try {
                const response = await fetch(`${API_BASE}/api/products`);
                const data = await response.json();
                addResult('后端连接成功', JSON.stringify(data, null, 2));
            } catch (error) {
                addResult('后端连接失败', error.message, true);
            }
        }
        
        async function testProducts() {
            addResult('测试开始', '正在获取产品列表...');
            try {
                const response = await fetch(`${API_BASE}/api/products/status/true?page=0&size=20`);
                const data = await response.json();
                
                if (data.data && data.data.content) {
                    addResult('产品API成功', 
                        `找到 ${data.data.content.length} 个产品\n` +
                        JSON.stringify(data.data.content, null, 2)
                    );
                } else {
                    addResult('产品API响应', JSON.stringify(data, null, 2));
                }
            } catch (error) {
                addResult('产品API失败', error.message, true);
            }
        }
        
        // 页面加载时自动测试
        window.onload = () => {
            addResult('页面信息', 
                `当前URL: ${window.location.href}\n` +
                `API地址: ${API_BASE}\n` +
                `用户代理: ${navigator.userAgent}`
            );
        };
    </script>
</body>
</html>
