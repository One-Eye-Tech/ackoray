name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # 确保这里是你推代码的分支名，如果是 master 就改 master

# 【关键修复】这里必须给 GitHub Actions 赋予写入 Pages 的权限！
permissions:
  contents: read
  pages: write
  id-token: write

# 允许并发部署排队
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 使用 Node 20，解决你截图中黄色的警告

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 确保这里是你的打包输出目录，Vue/Vite 默认是 dist
          path: ./dist 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4